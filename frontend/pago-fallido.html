<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pago no completado — Torneo</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#fdeef0,#fff);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .card{background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.1);padding:42px 34px;max-width:440px;text-align:center;}
  .ico{font-size:64px;}h1{color:#dc2626;font-size:24px;margin:10px 0;}p{color:#5a3548;}
  .btn{display:inline-block;margin-top:22px;background:#d6006e;color:#fff;font-weight:700;padding:13px 30px;border-radius:30px;text-decoration:none;}
</style></head>
<body><div class="card">
  <div class="ico">❌</div>
  <h1>El pago no se completó</h1>
  <p>No se pudo procesar el pago. No te preocupes, no se realizó ningún cobro. Podés intentarlo de nuevo.</p>
  <a href="/" class="btn">Volver a intentar</a>
</div></body></html>
